<script>
  const PASS_SCORE = 70;

  // 한국사능력검정시험 급수 판정
  function getHistoryGrade(type, score) {
    if (type === 'history_advanced') {
      if (score >= 80) return { text: '1급 합격 🥇', pass: true };
      if (score >= 60) return { text: '2급 합격 🥈', pass: true };
      if (score >= 50) return { text: '3급 합격 🥉', pass: true };
      return { text: '불합격 😢', pass: false };
    }
    if (type === 'history_basic') {
      if (score >= 80) return { text: '4급 합격 🥇', pass: true };
      if (score >= 60) return { text: '5급 합격 🥈', pass: true };
      if (score >= 50) return { text: '6급 합격 🥉', pass: true };
      return { text: '불합격 😢', pass: false };
    }
    return null;
  }

  window.addEventListener('DOMContentLoaded', () => {
    const raw = sessionStorage.getItem('wooagosa_result');
    if (!raw) {
      document.querySelector('main').innerHTML = '<div class="container-narrow" style="text-align:center;padding:3rem 0;"><p>결과 데이터가 없습니다.</p><a href="index.html" class="btn btn-primary" style="margin-top:1rem;">홈으로</a></div>';
      return;
    }
    const data = JSON.parse(raw);
    renderResult(data);
  });

  function renderResult(data) {
    const { questions, userAnswers, typeLabel, type, mode } = data;
    const total   = questions.length;
    const correct = userAnswers.filter(ua => ua.correct).length;
    const wrong   = total - correct;
    const score   = Math.round((correct / total) * 100);
    const historyGrade = getHistoryGrade(type, score);
    const pass    = historyGrade ? historyGrade.pass : score >= PASS_SCORE;

    // 점수 표시
    document.getElementById('score-number').textContent = score;
    document.getElementById('result-type-label').textContent = typeLabel + ' 모의고사';

    const badge = document.getElementById('pass-badge');
    const computerGrade = (type === 'computer_1' || type === 'computer_2')
      ? (score >= 60 ? '합격 🎉' : '불합격 😢') : null;

    if (historyGrade) {
      badge.textContent = historyGrade.text;
    } else if (computerGrade) {
      badge.textContent = computerGrade;
    } else {
      badge.textContent = pass ? '합격 🎉' : '불합격 😢';
    }
    badge.className = 'pass-badge ' + (pass ? 'pass' : 'fail');

    // 점수에 따라 원 색상
    const circle = document.getElementById('score-circle');
    circle.style.borderColor = pass ? 'rgba(34,197,94,.6)' : 'rgba(239,68,68,.6)';

    // 통계
    document.getElementById('result-stats').innerHTML = `
      <div class="stat-item"><div class="stat-num">${total}</div><div class="stat-lbl">총 문제</div></div>
      <div class="stat-item" style="color:#86efac"><div class="stat-num">${correct}</div><div class="stat-lbl">정답</div></div>
      <div class="stat-item" style="color:#fca5a5"><div class="stat-num">${wrong}</div><div class="stat-lbl">오답</div></div>
      <div class="stat-item"><div class="stat-num">${score}점</div><div class="stat-lbl">점수</div></div>
    `;

    // 오답 풀이 목록
    const wrongItems = questions
      .map((q, i) => ({ q, ua: userAnswers[i], idx: i }))
      .filter(item => !item.ua.correct);

    const container = document.getElementById('wrong-review');
    if (wrongItems.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--green);font-weight:700;font-size:1.1rem;">🎉 전부 정답입니다!</div>';
      return;
    }

    let html = `<h2 class="section-title">오답 풀이 (${wrongItems.length}문제)</h2><div class="wrong-review-list">`;

    wrongItems.forEach(({ q, ua, idx }, i) => {
      if (i > 0 && i % 5 === 0) {
        html += `<div class="mobile-inline-ad ad-slot-mid"></div>`;
      }
      html += `<div class="review-card">
        <div class="q-text">Q${idx + 1}. ${esc(q.question)}</div>`;

      if (q.situation) {
        html += `<div class="situation-box" style="margin-bottom:.75rem;">📍 ${esc(q.situation)}</div>`;
      }

      for (const [numStr, text] of Object.entries(q.choices)) {
        const num = parseInt(numStr);
        const isCorrectAns = q.answers.includes(num);
        const isSelected   = ua.selected.includes(num);
        let cls = 'review-choice';
        if (isCorrectAns) cls += ' correct';
        else if (isSelected && !isCorrectAns) cls += ' user-wrong';
        const icon = isCorrectAns ? '✅' : (isSelected ? '❌' : '　');
        html += `<div class="${cls}">${icon} ${num}. ${esc(text)}</div>`;
      }

      html += `<div class="review-explain">💡 ${esc(q.explanation)}</div>
      </div>`;
    });

    html += '</div>';
    container.innerHTML = html;

    // 모바일 인라인 광고 초기화 (5문제마다)
    container.querySelectorAll('.ad-slot-mid').forEach(el => {
      const ins = document.createElement('ins');
      ins.className = 'adsbygoogle';
      ins.style.display = 'block';
      ins.setAttribute('data-ad-client', 'ca-pub-6464921081676309');
      ins.setAttribute('data-ad-slot', '7080296704');
      ins.setAttribute('data-ad-format', 'auto');
      ins.setAttribute('data-full-width-responsive', 'true');
      el.appendChild(ins);
      (window.adsbygoogle = window.adsbygoogle || []).push({});
    });
  }

  function retryExam() {
    const raw = sessionStorage.getItem('wooagosa_result');
    if (!raw) { location.href = 'index.html'; return; }
    const { type, typeLabel, mode, questions } = JSON.parse(raw);
    const count = questions ? questions.length : 40;
    location.href = `exam.html?type=${encodeURIComponent(type)}&mode=${encodeURIComponent(mode)}&label=${encodeURIComponent(typeLabel)}&count=${count}`;
  }

  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
